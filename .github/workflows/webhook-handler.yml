name: Contentful Webhook Handler

on:
  workflow_dispatch:
    inputs:
      event_type:
        description: 'Event type from Contentful'
        required: true
        default: 'contentful-update'

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deployment workflow
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "${{ github.event.inputs.event_type }}"}'

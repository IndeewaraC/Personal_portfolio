name: Staging-with-API CI (Cypress Tests)

on:
  push:
    branches:
      - Staging-with-API  
  pull_request:
    branches:
      - staging    

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cypress Run
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          working-directory: ./muditha-portfolio
          start: npm run dev
          wait-on: 'http://localhost:5173'
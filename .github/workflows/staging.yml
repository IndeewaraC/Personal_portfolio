name: Staging CI (Cypress Tests)

on:
  push:
    branches:
      - staging  
  pull_request:
    branches:
      - main    

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cypress Run
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          
          # 1. Point Cypress to your specific project folder
          working-directory: ./muditha-portfolio
          
          # 2. Boot up the Vite local server in the background
          start: npm run dev
          
          # 3. Tell Cypress to wait until the server answers before testing
          wait-on: 'http://localhost:5173'
name: Staging CI (Cypress Tests)

on:
  push:
    branches:
      - staging
  pull_request:
    branches:
      - main

jobs:
  deploy-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to Vercel (Staging Preview)
        if: github.ref == 'refs/heads/staging'
        id: vercel-deploy
        working-directory: ./muditha-portfolio
        run: |
          npm install -g vercel
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          DEPLOY_URL=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: team_iUuBTHt70kcCq0CcIh88oBAZ
          VERCEL_PROJECT_ID: prj_vSk0r9pTbSC6WesSknLwieXiGoIB
          VITE_CONTENTFUL_SPACE_ID: ${{ secrets.VITE_CONTENTFUL_SPACE_ID }}
          VITE_CONTENTFUL_ACCESS_TOKEN: ${{ secrets.VITE_CONTENTFUL_ACCESS_TOKEN }}

      - name: Cypress Run (against staging URL)
        if: github.ref == 'refs/heads/staging'
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          working-directory: ./muditha-portfolio
          config: baseUrl=${{ steps.vercel-deploy.outputs.url }}
        env:
          VITE_CONTENTFUL_SPACE_ID: ${{ secrets.VITE_CONTENTFUL_SPACE_ID }}
          VITE_CONTENTFUL_ACCESS_TOKEN: ${{ secrets.VITE_CONTENTFUL_ACCESS_TOKEN }}

      - name: Cypress Run (against localhost for PR to main)
        if: github.event_name == 'pull_request'
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          working-directory: ./muditha-portfolio
          start: npm run dev
          wait-on: 'http://localhost:5173'
        env:
          VITE_CONTENTFUL_SPACE_ID: ${{ secrets.VITE_CONTENTFUL_SPACE_ID }}
          VITE_CONTENTFUL_ACCESS_TOKEN: ${{ secrets.VITE_CONTENTFUL_ACCESS_TOKEN }}
